version: '3.8'

services:
  codefix-agent:
    build: .
    container_name: codefix-agent
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped

  evaluation:
    build: .
    container_name: codefix-evaluation
    ports:
      - "8502:8501"
    volumes:
      - ./logs:/app/logs
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    command: ["streamlit", "run", "evaluation.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped

  feedback-loop:
    build: .
    container_name: codefix-feedback
    ports:
      - "8503:8501"
    volumes:
      - ./logs:/app/logs
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    command: ["streamlit", "run", "feedback_loop.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped

  log-dashboard:
    build: .
    container_name: codefix-logs
    ports:
      - "8504:8501"
    volumes:
      - ./logs:/app/logs
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    command: ["streamlit", "run", "log_dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped