site_name: CodeFix Agent
site_description: Autonomous AI-Powered Bug Detection & Code Fixing using Groq LLM
site_author: Hardik
site_url: https://hardik696969.github.io/CodeFix-Agent

repo_name: hardik696969/CodeFix-Agent
repo_url: https://github.com/hardik696969/CodeFix-Agent

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Modules:
      - Web UI: modules/web-ui.md
      - Evaluation: modules/evaluation.md
      - Feedback Loop: modules/feedback-loop.md
      - Logging: modules/logging.md
  - Docker: docker.md
  - Results: results.md